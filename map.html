<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="map.title">מפת המשחק</title>
<link rel="stylesheet" href="/leaflet.css"/>
<style>
  :root{
    --ink:#2b1d0e; --gold:#f0a500; --gold-deep:#c47f00; --paper:#efe2bf;
    --green:#27a844; --green-d:#1e7f34; --red:#ff6b5e; --red-d:#d94436; --gray:#9c9488; --gray-d:#6f685d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Heebo','Segoe UI',Arial,sans-serif;background:#1c160d;color:var(--ink);
    -webkit-text-size-adjust:100%;overflow:hidden;}

  /* במה: שומרת על יחס התמונה של המסגרת. מיושרת למעלה כדי לא לבזבז שטח שחור */
  #stage{position:relative;width:100vw;min-height:100vh;overflow:hidden;
    display:flex;align-items:flex-start;justify-content:center;
    padding-top:var(--mailH,40px);box-sizing:border-box;}
  #frameBox{position:relative;}
  #frameImg{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none;}

  /* חלון המפה — ממוקם בתוך אזור הקרם של המסגרת (אחוזים יחסית ל-frameBox) */
  #mapWindow{position:absolute;left:26.5%;top:24.8%;right:24.8%;bottom:16.2%;
    border-radius:6px;overflow:hidden;box-shadow:inset 0 0 0 2px rgba(120,80,20,.35), 0 8px 26px rgba(0,0,0,.35);}
  #map{width:100%;height:100%;background:#1a1a1a;}

  /* כותרת שם החברה/המשחק על המפה */
  #mapTitle{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:600;
    background:linear-gradient(135deg,rgba(43,29,14,.92),rgba(80,55,20,.92));
    color:#fff;padding:6px 16px;border-radius:999px;font-weight:800;
    font-size:clamp(12px,2.4vw,18px);white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis;
    box-shadow:0 4px 14px rgba(0,0,0,.4);border:1.5px solid var(--gold);}

  /* סיכת תחנה */
  .pin{display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;
    border-radius:50%;border:2.5px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.45);
    width:var(--pin,30px);height:var(--pin,30px);font-size:calc(var(--pin,30px)*0.5);transition:transform .15s, background .2s;}
  .pin.none{background:linear-gradient(135deg,var(--gray),var(--gray-d));}
  .pin.correct{background:linear-gradient(135deg,var(--green),var(--green-d));}
  .pin.wrong{background:linear-gradient(135deg,var(--red),var(--red-d));}
  .pin.pending{background:linear-gradient(135deg,#ffd23f,#e0a800);color:#3a2a00;
    animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

  /* מייל — חלק עליון של העמוד, מעל הכל, לא על טקסט הרקע */
  #topMail{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:1000;
    background:rgba(43,29,14,.92);border:1px solid var(--gold);border-radius:999px;
    padding:5px 16px;color:#f4ecd6;font-size:clamp(10px,1.8vw,13px);font-weight:700;white-space:nowrap;
    max-width:92vw;overflow:hidden;text-overflow:ellipsis;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.4);}
  #topMail a{color:var(--gold);font-weight:800;text-decoration:none;}

  /* מקרא צבעים — מלבן אנכי צמוד לפינה ימנית-תחתונה */
  #legend{position:fixed;bottom:10px;right:10px;z-index:1000;
    display:flex;flex-direction:column;gap:5px;
    background:rgba(43,29,14,.9);padding:8px 11px;border-radius:12px;border:1px solid rgba(240,165,0,.55);
    box-shadow:0 3px 10px rgba(0,0,0,.4);}
  #legend .it{display:flex;align-items:center;gap:6px;color:#f4ecd6;font-size:clamp(9px,1.6vw,12px);font-weight:600;white-space:nowrap;}
  #legend .dot{width:12px;height:12px;border-radius:50%;border:1.5px solid #fff;flex-shrink:0;}
  .dot.none{background:var(--gray);} .dot.correct{background:var(--green);}
  .dot.wrong{background:var(--red);} .dot.pending{background:#ffd23f;}

  /* סרגל ניווט — חזרה / לוח תוצאות / סורק. צמוד לפינה שמאלית-תחתונה */
  #navBar{position:fixed;bottom:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:6px;}
  #navBar button{background:rgba(43,29,14,.92);color:#f4ecd6;border:1px solid var(--gold);border-radius:10px;
    padding:8px 12px;font-weight:800;font-size:clamp(11px,1.8vw,13px);font-family:inherit;cursor:pointer;
    white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.4);text-align:center;}
  #navBar button:active{transform:scale(.96);}
  #navBar button.gold{background:linear-gradient(135deg,#f0a500,#c47f00);color:#1c160d;border:none;}

  /* מצב טעינה / שגיאה */
  #msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:900;
    background:#1c160d;color:#f4ecd6;font-size:18px;font-weight:700;text-align:center;padding:24px;}
  .leaflet-control-attribution{font-size:9px !important;}

  /* גודל המסגרת מחושב ב-JS (sizeFrame) לפי השטח הזמין מתחת למייל */

  /* כשמצלמים את המפה לתמונה (printing-snapshot) — מציגים את התמונה ומחביאים את המפה החיה */
  body.printing-snapshot #mapSnapshot{ display:block !important; }
  body.printing-snapshot #map{ visibility:hidden !important; }

  /* ===== מצב תמונה קבועה (snapshot) =====
     כשלמנהל יש snapshot שמור, השחקן רואה תמונה סטטית + סיכות HTML באחוזים —
     אותה תצוגה בדיוק בכל מכשיר ויחס-מסך, בלי Leaflet ובלי טעינת אריחים. */
  #snapBox{position:absolute;inset:0;display:none;z-index:500;}
  #snapBox img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;
    user-select:none;-webkit-user-drag:none;}
  #snapBox .pin{position:absolute;transform:translate(-50%,-50%);}
  #snapBox .attr{position:absolute;bottom:2px;right:4px;z-index:10;font-size:9px;color:#fff;
    background:rgba(0,0,0,.45);padding:0 4px;border-radius:3px;pointer-events:none;}

  /* הדפסה: דף A4 לאורך, המסגרת ממלאה את העמוד. נכתב אחרון כדי לגבור על שאר הכללים */
  @media print{
    @page{ size:A4 portrait; margin:6mm; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important; }
    html,body{ background:#fff !important; width:auto !important; height:auto !important; overflow:visible !important; }
    #msg,#navBar{ display:none !important; }
    #stage{ position:static !important; width:100% !important; height:auto !important; display:block !important; overflow:visible !important; }
    /* המסגרת ממלאה את רוחב A4. יחס הממדים נשמר ע"י aspect-ratio + height:auto. */
    #frameBox{ position:relative !important; width:188mm !important; max-width:188mm !important; aspect-ratio:1054/1492 !important; height:auto !important; margin:0 auto !important; }
    #frameImg{ position:absolute !important; inset:0 !important; display:block !important; width:100% !important; height:100% !important; object-fit:fill !important; }
    #mapSnapshot{ display:block !important; }   /* התמונה המצולמת — סטטית, לא משתנה בהדפסה */
    #map{ visibility:hidden !important; }
    #mapWindow{ box-shadow:none !important; }
    .leaflet-control-zoom{ display:none !important; }
    #legend{ display:none !important; }
    #topMail{ position:absolute !important; top:1mm !important; }
  }
</style>
</head>
<body>
<div id="topMail"><span data-i18n="common.moreGames">למשחקים נוספים פנו ל-</span><a href="mailto:mishak.hevra@gmail.com">mishak.hevra@gmail.com</a></div>
<div id="stage">
  <div id="frameBox">
    <img id="frameImg" src="/map-frame.png" alt="">
    <div id="mapWindow">
      <div id="map"></div>
      <div id="snapBox"></div>
      <div id="mapTitle" data-i18n="map.loading">טוען…</div>
    </div>
  </div>
</div>
<div id="legend">
  <span class="it"><span class="dot none"></span> <span data-i18n="map.legNone">טרם נסרק</span></span>
  <span class="it"><span class="dot correct"></span> <span data-i18n="map.legCorrect">נכון</span></span>
  <span class="it"><span class="dot wrong"></span> <span data-i18n="map.legWrong">לא נכון</span></span>
  <span class="it"><span class="dot pending"></span> <span data-i18n="map.legPending">ממתין</span></span>
</div>
<div id="navBar">
  <button class="gold" id="navBack" onclick="goBack()" data-i18n="map.back">↩️ חזרה</button>
  <button id="navBoard" onclick="goBoard()" data-i18n="map.navBoard">📊 לוח תוצאות</button>
  <button id="navScan" onclick="goScan()" data-i18n="map.navScan">📷 סריקת תחנה</button>
</div>
<div id="msg" data-i18n="map.loading">טוען מפה…</div>

<script src="/i18n.js"></script>
<script src="/leaflet.js"></script>
<script src="/html2canvas.js"></script>
<script>
const parts = location.pathname.split('/');
const CID = parts[2];
const QS = new URLSearchParams(location.search);
// מזהה השחקן: קודם מה-URL (?player=), ואם חסר — משחזרים מ-localStorage
// (אותו מפתח שבו station/company/join שומרים את השחקן), כדי שצבעי הסטטוס
// יוצגו גם אם הגיעו למפה בלי הפרמטר (למשל מכפתור "תצוגת שחקן" או ניווט חוזר).
let PLAYER = QS.get('player') || '';
if(!PLAYER){
  try {
    const saved = JSON.parse(localStorage.getItem('fg_player_' + CID) || 'null');
    if(saved && saved.playerId) PLAYER = saved.playerId;
  } catch(e){}
}
// אם קיבלנו את השחקן מה-URL — נשמור אותו מקומית כדי שיישמר להמשך הניווט
if(QS.get('player')){
  try {
    const cur = JSON.parse(localStorage.getItem('fg_player_' + CID) || 'null');
    if(!cur || cur.playerId !== QS.get('player')){
      localStorage.setItem('fg_player_' + CID, JSON.stringify({ playerId: QS.get('player') }));
    }
  } catch(e){}
}
const PRINT = QS.get('print')==='1';

// ניווט — מבלי להסתיר את טקסט הרקע/מפה (כפתורים בפינה, לא על התוכן)
function pq(){ return PLAYER ? ('?player='+encodeURIComponent(PLAYER)) : ''; }
function goBack(){
  // אם הגענו מעמוד אחר באתר — חזרה אליו; אחרת לעמוד החברה
  if(document.referrer && document.referrer.indexOf(location.host)>-1){ history.back(); }
  else { location.href = '/c/'+CID+pq(); }
}
function goBoard(){ location.href = '/c/'+CID+'/board'+pq(); }
function goScan(){ location.href = '/c/'+CID+(pq()?pq()+'&scan=1':'?scan=1'); }

// במצב הדפסה: הסתר ניווט (כדי שלא יודפס)
if(PRINT){ const nb=document.getElementById('navBar'); if(nb) nb.style.display='none'; }

let map = null, pinLayers = {}, frameBoxSized = false;

// טעינת מסגרת המפה לפי שפה (map-frame-en.png וכו', עם נפילה לעברית בשרת)
function applyFrame(){
  var img = document.getElementById('frameImg');
  if(img) img.src = '/map-frame.png?lang=' + getLang();
}

// התאמת גודל frameBox כדי שהמסגרת תמלא את השטח הזמין מתחת לכיתוב המייל
function sizeFrame(){
  const box = document.getElementById('frameBox');
  const mail = document.getElementById('topMail');
  const ar = 1054/1492; // יחס המסגרת (רוחב/גובה)
  const mailH = mail ? (mail.getBoundingClientRect().height + 16) : 40; // גובה המייל + מרווח
  document.documentElement.style.setProperty('--mailH', mailH + 'px');
  const vw = window.innerWidth;
  const availH = window.innerHeight - mailH;   // הגובה הזמין מתחת למייל
  let w, h;
  // מתאימים לגובה הזמין; אם רחב מדי — מתאימים לרוחב
  if (availH * ar <= vw){ h = availH; w = availH * ar; }
  else { w = vw; h = vw / ar; }
  box.style.width = w + 'px'; box.style.height = h + 'px';
  if (map) map.invalidateSize();
}
window.addEventListener('resize', sizeFrame);

let pinSize = 30;
let _tilesLoading = 0, _tileLayerRef = null;   // מעקב טעינת אריחים (למניעת רקע שחור בהדפסה)
function buildPin(id, status){
  const sz = pinSize, anc = sz/2;
  return L.divIcon({ className:'', html:`<div class="pin ${status}" style="--pin:${sz}px">${id}</div>`,
    iconSize:[sz,sz], iconAnchor:[anc,anc] });
}

// ===== ציור מצב snapshot: תמונה קבועה + סיכות HTML באחוזים =====
let _snapImgLoaded = false;
function renderSnapshot(snap, cfg, d){
  const box = document.getElementById('snapBox');
  document.getElementById('map').style.display='none';
  box.style.display='block';

  // תמונה — נוצרת פעם אחת; ברענוני סטטוס רק הסיכות מתעדכנות
  let img = document.getElementById('snapImg');
  if(!img){
    img = document.createElement('img');
    img.id='snapImg'; img.alt='';
    img.onload = ()=>{ _snapImgLoaded = true; };
    img.src = snap.image;
    box.appendChild(img);
    const attr = document.createElement('span');
    attr.className='attr'; attr.textContent='Esri';
    box.appendChild(attr);
  }

  // גודל סיכה: שומר על אותו יחס ויזואלי כמו בעורך — מוקטן/מוגדל לפי רוחב החלון בפועל
  const winW = document.getElementById('mapWindow').clientWidth || 1;
  const scale = winW / (snap.viewW || winW);
  const pin = Math.max(14, Math.min(64, Math.round((cfg.markerSize || 30) * scale)));

  // סיכות — נבנות מחדש בכל רענון (סטטוס/צבע מתעדכנים)
  box.querySelectorAll('.pin').forEach(el=>el.remove());
  snap.markers.forEach(mk=>{
    if(mk.x < 0 || mk.x > 100 || mk.y < 0 || mk.y > 100) return;  // מחוץ לתמונה
    const st = (d.stations && d.stations[mk.id]) ? d.stations[mk.id] : null;
    const status = st ? st.status : 'none';
    const tip = (st && st.title && st.title.trim()) ? st.title.trim() : (t('common.station') + ' ' + mk.id);
    const el = document.createElement('div');
    el.className = 'pin ' + status;
    el.style.cssText = `--pin:${pin}px; left:${mk.x}%; top:${mk.y}%;`;
    el.textContent = mk.id;
    el.title = tip;
    box.appendChild(el);
  });

  // הדפסה: התוכן כבר סטטי — פשוט מדפיסים אחרי שהתמונה נטענה
  window.fgPrintMap = async function(){
    const t0 = Date.now();
    while(!_snapImgLoaded && Date.now()-t0 < 4000){ await new Promise(r=>setTimeout(r,100)); }
    window.print();
  };
  if(PRINT && !window._printed){ window._printed = true; setTimeout(()=>window.fgPrintMap(), 600); }
}
// רענון גודל סיכות בעת שינוי גודל חלון (במצב snapshot) — עם השהיה קצרה כדי
// לא להציף בקשות בזמן סיבוב מסך
let _snapResizeT = null;
window.addEventListener('resize', ()=>{
  const box = document.getElementById('snapBox');
  if(!box || box.style.display!=='block') return;
  clearTimeout(_snapResizeT);
  _snapResizeT = setTimeout(load, 250);
});

async function load(){
  let d;
  try {
    const r = await fetch(`/api/company/${CID}/map?player=${encodeURIComponent(PLAYER)}`);
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||t('map.loadErr')); }
    d = await r.json();
  } catch(e){
    document.getElementById('msg').textContent = e.message || t('map.loadErr');
    return;
  }

  // שפת ברירת-מחדל של החברה + מסגרת לפי שפה
  if(d.defaultLang){ window.FG_DEFAULT_LANG = d.defaultLang; I18N.applyLang(); }
  applyFrame();

  const cfg = d.mapConfig || {};
  pinSize = isFinite(cfg.markerSize) ? Number(cfg.markerSize) : 30;
  document.getElementById('mapTitle').textContent = d.companyName || d.gameName || t('map.title');
  document.title = (d.companyName || t('map.title'));

  if(!cfg.markers || !cfg.markers.length){
    document.getElementById('msg').textContent = t('map.notSet');
    document.getElementById('msg').style.background = 'rgba(28,22,13,.95)';
    return;
  }

  sizeFrame();
  document.getElementById('msg').style.display='none';

  // ===== מצב תמונה קבועה (snapshot) =====
  // אם המנהל שמר snapshot — מציגים אותו במקום מפת Leaflet חיה. התמונה זהה בכל
  // מכשיר; חלון-המפה בעורך ובשחקן חולקים את אותם אחוזי מסגרת, כך שהיחס זהה
  // ו-object-fit:fill אינו מעוות. הסיכות מצוירות כ-HTML לפי אחוזים על התמונה,
  // כך שצבע הסטטוס ממשיך להתעדכן בכל רענון בלי לגעת בתמונה.
  const snap = cfg.snapshot;
  if(snap && snap.image && Array.isArray(snap.markers) && snap.markers.length && !map){
    renderSnapshot(snap, cfg, d);
    return;
  }
  // אין snapshot (או שכבר רצה מפה חיה) — ממשיכים במסלול Leaflet הרגיל
  document.getElementById('snapBox').style.display='none';
  document.getElementById('map').style.display='';

  const hasBounds = cfg.bounds && isFinite(cfg.bounds.north);
  if(!map){
    map = L.map('map', {
      center:[cfg.center.lat, cfg.center.lng], zoom: cfg.zoom,
      zoomControl:false, attributionControl:true, maxZoom:21,
      zoomSnap:0, zoomDelta:0.5,  // מאפשר זום שברירי כדי ש-fitBounds ישחזר את האזור המדויק בלי zoom-out
      // נעילת אינטראקציה אם המנהל נעל את המפה — השחקן רואה רק את התצוגה הקבועה
      dragging: !cfg.locked, scrollWheelZoom: !cfg.locked, doubleClickZoom: !cfg.locked,
      touchZoom: !cfg.locked, boxZoom: !cfg.locked, keyboard: !cfg.locked, tap: !cfg.locked
    });
    const _tl = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom:21, maxNativeZoom:19, attribution:'Esri',
        keepBuffer: 12,        // שומר הרבה אריחים בזיכרון כך שלא ייעלמו בזמן reflow של הדפסה
        crossOrigin: 'anonymous',   // חיוני כדי ש-html2canvas יוכל לצלם אריחים מדומיין חיצוני (Esri תומך CORS)
        updateWhenIdle: false, updateWhenZooming: true });
    _tl.addTo(map);
    trackTiles(_tl);
    if(!cfg.locked) L.control.zoom({position:'topleft'}).addTo(map);
    [60,200,500,900,1500].forEach(ms=>setTimeout(applyExactView, ms));
  }

  // ===== שחזור התצוגה בדיוק כפי שהמנהל מסגר ידנית =====
  // המנהל קובע את התצוגה (זום + גרירה) בעורך ושומר center+zoom. כאן משחזרים בדיוק
  // אותם — אותה שיטה בדיוק כמו בעורך — כך שמה שמוסגר ידנית = מה שהשחקן רואה = מה שמודפס.
  // ההדפסה נעשית ע"י צילום (html2canvas), כך שמה שרואים על המסך בגודל הזה הוא מה שיודפס.
  function applyExactView(){
    try{
      map.invalidateSize();
      const cLat = (cfg.center && isFinite(cfg.center.lat)) ? cfg.center.lat : 31.8133;
      const cLng = (cfg.center && isFinite(cfg.center.lng)) ? cfg.center.lng : 34.7780;
      const z = isFinite(cfg.zoom) ? cfg.zoom : 16;
      map.setView([cLat, cLng], z, {animate:false});
      updateDiag();
    }catch(e){}
  }

  // אבחון: מציג על המפה את גודל המיכל בפיקסלים, היחס, והזום — נראה גם בהדפסה.
  // נועד לאיתור הפער בין העורך להדפסה. נוסיף ?diag=1 לכתובת כדי להציג.
  function updateDiag(){
    if(!/[?&]diag=1/.test(location.search)) return;
    let el = document.getElementById('diagBox');
    if(!el){
      el = document.createElement('div'); el.id='diagBox';
      el.style.cssText='position:absolute;top:4px;left:4px;z-index:5000;background:rgba(0,0,0,.8);color:#0f0;font:11px/1.4 monospace;padding:4px 6px;border-radius:4px;white-space:pre;pointer-events:none;';
      document.getElementById('mapWindow').appendChild(el);
    }
    try{
      const s = map.getSize();
      el.textContent = `size: ${s.x}×${s.y}px\nratio: ${(s.x/s.y).toFixed(3)}\nzoom: ${map.getZoom().toFixed(3)}`;
    }catch(e){}
  }

  // ציור / עדכון סיכות — tooltip = כותרת התחנה כפי שהוגדרה (בלי לשכפל "תחנה N")
  cfg.markers.forEach(mk=>{
    const stStatus = (d.stations && d.stations[mk.id]) ? d.stations[mk.id].status : 'none';
    const rawTitle = (d.stations && d.stations[mk.id] && d.stations[mk.id].title) ? d.stations[mk.id].title : '';
    const tip = rawTitle && rawTitle.trim() ? rawTitle.trim() : (t('common.station') + ' ' + mk.id);
    if(pinLayers[mk.id]){
      pinLayers[mk.id].setIcon(buildPin(mk.id, stStatus));
    } else {
      const m = L.marker([mk.lat, mk.lng], { icon: buildPin(mk.id, stStatus), interactive:true })
        .addTo(map).bindTooltip(tip, {direction:'top', offset:[0,-(pinSize/2)-2]});
      pinLayers[mk.id] = m;
    }
  });

  // שמירה על האזור הקבוע (גם בעדכוני רענון)
  if(cfg.locked){
    applyExactView();
  }

  // ===== הדפסה דטרמיניסטית =====
  // עוקבים אחרי מספר האריחים בטעינה; settleMap ממתין שכולם ייטענו לפני ההדפסה,
  // כך שלא מקבלים רקע שחור (אריחים שלא הספיקו לעלות) בדף המודפס.
  function trackTiles(layer){
    _tileLayerRef = layer;
    layer.on('loading', ()=>{ _tilesLoading++; });
    layer.on('load', ()=>{ _tilesLoading = 0; });   // 'load' = כל האריחים הנראים נטענו
  }

  function waitTilesIdle(maxMs){
    return new Promise(resolve=>{
      const start = Date.now();
      const check = ()=>{
        // אם שכבת האריחים שידרה 'load' (אין טעינות תלויות) או עבר זמן בטחון — ממשיכים
        if(_tilesLoading === 0 || Date.now()-start > maxMs){ resolve(); return; }
        setTimeout(check, 80);
      };
      // נחכה רגע קצר כדי לתת ל-'loading' להתחיל אחרי setView, ואז נבדוק
      setTimeout(check, 120);
    });
  }

  async function settleMap(){
    applyExactView();
    // נחכה גם לאירוע 'load' של המפה וגם שהאריחים יסתיימו (מה שמגיע ראשון/בטוח)
    await new Promise(res=>{
      let done=false; const finish=()=>{ if(done)return; done=true; try{map.off('load',finish);}catch(e){} res(); };
      try{ map.once('load', finish); }catch(e){}
      setTimeout(finish, 1500);
    });
    await waitTilesIdle(2500);
    await new Promise(r=>setTimeout(r, 350));   // שהות קצרה לציור סופי
  }

  async function doPrint(){
    // ===== הדפסה ע"י "צילום" המפה לתמונה =====
    // במקום להדפיס מפת Leaflet חיה (שמתרנדרת מחדש בגודל אחר → זום/מיקום משתנים, רקע שחור),
    // מצלמים את אזור המפה כפי שהוא נראה במסך לתמונה סטטית, ומדפיסים אותה. תמונה לא משתנה.
    const win = document.getElementById('mapWindow');
    try{
      // קודם מוודאים שהמפה במצב יציב והאריחים טעונים
      await settleMap();
      // מצלמים את חלון המפה (לוויין + תחנות + כותרת) לקנבס
      const canvas = await html2canvas(win, {
        useCORS: true, allowTaint: false, backgroundColor: null,
        scale: 2,                 // רזולוציה כפולה לאיכות הדפסה
        logging: false,
        width: win.clientWidth, height: win.clientHeight
      });
      const dataUrl = canvas.toDataURL('image/png');
      // יוצרים/מעדכנים תמונת snapshot שתוצג במקום המפה החיה בזמן הדפסה
      let snap = document.getElementById('mapSnapshot');
      if(!snap){
        snap = document.createElement('img');
        snap.id = 'mapSnapshot';
        snap.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:none;z-index:700;';
        win.appendChild(snap);
      }
      snap.src = dataUrl;
      // מסמנים את ה-body שאנחנו במצב snapshot — ה-CSS יחביא את המפה החיה ויראה את התמונה
      document.body.classList.add('printing-snapshot');
      await new Promise(r=>setTimeout(r, 150));   // רגע שהתמונה תיכנס ל-DOM
      window.print();
      // אחרי ההדפסה — מסירים את מצב ה-snapshot ומחזירים מפה חיה
      setTimeout(()=>{ document.body.classList.remove('printing-snapshot'); applyExactView(); }, 400);
    }catch(e){
      // אם הצילום נכשל (למשל CORS) — נופלים להדפסה רגילה של המפה החיה
      document.body.classList.remove('printing-snapshot');
      try{ await settleMap(); }catch(_){}
      window.print();
      setTimeout(()=>applyExactView(), 400);
    }
  }

  if(!window._printFitHooked){
    window._printFitHooked=true;
    window.addEventListener('afterprint', ()=>{ document.body.classList.remove('printing-snapshot'); sizeFrame(); applyExactView(); });
  }

  // הדפסה אוטומטית כשמגיעים עם ?print=1 (מהדשבורד)
  if(PRINT && !window._printed){
    window._printed=true;
    setTimeout(()=>{ doPrint(); }, 1400);
  }

  // הדפסה ידנית — חשיפת פונקציה גלובלית (אם תרצה כפתור בעמוד השחקן בעתיד)
  window.fgPrintMap = doPrint;

  window._lastBounds = hasBounds ? cfg.bounds : null;
}

const PRINT_MODE = PRINT;
load();
// רענון סטטוס צבעים אוטומטי (מושבת במצב הדפסה כדי לא לרענן באמצע)
if(!PRINT_MODE) setInterval(load, 5000);
</script>
</body>

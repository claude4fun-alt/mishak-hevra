<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="common.gameName">משחק חברה</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; color:#fff;
    background:#0e1a14 url('/poster.png') center top / cover no-repeat fixed; }
  .overlay { position:fixed; inset:0; background:linear-gradient(180deg, rgba(10,20,15,.05), rgba(10,20,15,.25)); z-index:0; }
  #welcome { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding:0 0 40px; }
  #welcome .companyName { background:rgba(0,0,0,.5); padding:8px 24px; border-radius:30px; font-size:20px; font-weight:800; margin-bottom:16px; backdrop-filter:blur(4px); }
  #welcome .startBtn { background:linear-gradient(135deg,#f5b800,#ff9100); color:#1a1208; border:none; padding:20px 70px; border-radius:50px; font-size:26px; font-weight:900; font-family:inherit; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 0 4px rgba(255,255,255,.15); letter-spacing:1px; animation:bob 2s ease-in-out infinite; }
  @keyframes bob { 50% { transform:translateY(-8px); } }
  #welcome .startBtn:active { transform:scale(.96); }
  #welcome .hint { margin-top:14px; font-size:14px; color:rgba(255,255,255,.85); text-shadow:0 2px 8px rgba(0,0,0,.8); }
  #welcome .langWrap { margin-bottom:18px; }
  #menu { position:relative; z-index:2; min-height:100vh; display:none; align-items:center; justify-content:center; padding:20px; }
  .card { background:rgba(255,255,255,.97); color:#1a2a4a; border-radius:24px; padding:32px 28px; max-width:420px; width:100%; text-align:center; box-shadow:0 25px 60px rgba(0,0,0,.5); }
  .card .langWrap { display:flex; justify-content:center; margin-bottom:14px; }
  .card .logo { font-size:28px; font-weight:900; margin-bottom:2px; }
  .card .sub { color:#5a6b8a; margin-bottom:22px; font-size:15px; }
  .btn { display:block; width:100%; padding:16px; border:none; border-radius:14px; font-weight:800; font-size:17px; text-decoration:none; margin-bottom:12px; color:#fff; cursor:pointer; font-family:inherit; }
  .bjoin { background:linear-gradient(135deg,#22a06b,#16c79a); }
  .bscan { background:linear-gradient(135deg,#f5b800,#ff9100); color:#1a1208; }
  .b2 { background:linear-gradient(135deg,#2a4d9e,#3b7dd8); }
  #qrReader { width:100%; max-width:320px; margin:8px auto 12px; border-radius:14px; overflow:hidden; }
  .scan-err { color:#c0392b; font-size:13px; margin-bottom:10px; }
  .credit { color:#8a98b5; font-size:13px; margin-top:16px; }
  .err-screen { position:relative; z-index:2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .ph-step { background:#f0f3fa; border-radius:12px; padding:13px 15px; font-size:15px; line-height:1.5; color:#2a3a5a; border-inline-start:4px solid #7d6bb8; }
</style>
</head>
<body>

<div id="loadingErr" class="err-screen hidden" style="display:none">
  <div class="card"><h2 id="errMsg">טוען...</h2></div>
</div>

<div id="welcome" style="display:none">
  <div class="companyName" id="companyNameTop"></div>
  <div class="langWrap"><span id="langPickerW"></span></div>
  <button class="startBtn" onclick="enter()" data-i18n="company.start">התחל ▶</button>
  <div class="hint" data-i18n="company.startHint">לחצו כדי להתחיל את ההרפתקה</div>
</div>

<div class="overlay" id="ov" style="display:none"></div>
<div id="menu">
  <div class="card">
    <div class="langWrap"><span id="langPickerM"></span></div>
    <div class="logo" id="gameName" data-i18n="common.gameName">משחק חברה</div>
    <div class="sub" id="companyNameMenu"></div>
    <a class="btn bjoin" id="joinLink" href="#" data-i18n="company.join">🙋 הצטרף למשחק</a>
    <button class="btn bscan" id="scanBtn" onclick="startScan()" data-i18n="common.scanStation">📷 סרוק QR של תחנה</button>
    <div id="qrReader"></div>
    <p class="scan-err" id="scanErr"></p>
    <button class="btn b2" style="display:none" id="stopScanBtn" onclick="stopScan()" data-i18n="common.stopScan">עצור סריקה</button>
    <a class="btn b2" id="boardLink" href="#" data-i18n="common.board">📊 לוח תוצאות חי</a>
    <a class="btn b2" id="progressLink" href="#" style="background:linear-gradient(135deg,#22a06b,#16c79a)" data-i18n="common.progress">🗺️ ההתקדמות שלי</a>
    <a class="btn b2" id="mapLink" href="#" style="background:linear-gradient(135deg,#8a5a00,#c47f00)" data-i18n="common.gameMap">🧭 מפת המשחק</a>
    <button class="btn b2" style="background:linear-gradient(135deg,#5a4b8a,#7d6bb8)" onclick="showPlayerHelp()" data-i18n="phelp.btn">❓ איך משחקים</button>
    <p class="credit" data-i18n="common.createdBy">נוצר ע"י Amir Cohen</p>
    <p class="credit" style="margin-top:6px"><span data-i18n="common.moreGames">למשחקים נוספים פנו ל-</span><a href="mailto:mishak.hevra@gmail.com" style="color:#c47f00;font-weight:700;text-decoration:none">mishak.hevra@gmail.com</a></p>
  </div>
</div>

<div id="playerHelp" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(10,20,15,.75);backdrop-filter:blur(4px);overflow:auto;padding:20px">
  <div style="max-width:480px;margin:24px auto;background:#fff;color:#1a2a4a;border-radius:22px;padding:26px;box-shadow:0 25px 60px rgba(0,0,0,.5)">
    <h1 style="font-size:24px;text-align:center;margin-bottom:18px" data-i18n="phelp.title">🎮 איך משחקים</h1>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="ph-step" data-i18n="phelp.s1"></div>
      <div class="ph-step" data-i18n="phelp.s2"></div>
      <div class="ph-step" data-i18n="phelp.s3"></div>
      <div class="ph-step" data-i18n="phelp.s4"></div>
      <div class="ph-step" data-i18n="phelp.s5"></div>
      <div class="ph-step" data-i18n="phelp.s6"></div>
    </div>
    <div style="margin-top:16px;padding:14px;border-radius:14px;background:linear-gradient(135deg,#fff3cd,#ffe9a8);color:#5a3d12;font-weight:700;line-height:1.5;text-align:center" data-i18n="phelp.goal"></div>
    <button class="btn bjoin" style="margin-top:18px" onclick="hidePlayerHelp()" data-i18n="phelp.close">הבנתי, בואו נתחיל!</button>
  </div>
</div>

<script src="/i18n.js"></script>
<script>
// ===== צליל סריקה =====
let _ac=null,_unlocked=false;
function _ctx(){ if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}} if(_ac&&_ac.state==='suspended')_ac.resume().catch(()=>{}); return _ac;}
function _unlock(){const c=_ctx();if(!c)return;if(c.state==='suspended')c.resume().catch(()=>{});if(!_unlocked){try{const b=c.createBuffer(1,1,22050),s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);_unlocked=true;}catch(e){}}}
['pointerdown','touchstart','click','keydown'].forEach(ev=>document.addEventListener(ev,_unlock,{passive:true}));
function _tone(f,s,d,t,v){const c=_ctx();if(!c)return;const t0=c.currentTime+s;const o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(v||0.25,t0+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);o.start(t0);o.stop(t0+d+0.05);}
function playScanSound(){_unlock();_tone(1200,0,0.08,'square',0.22);_tone(660,0.12,0.14,'sine',0.25);_tone(880,0.26,0.2,'sine',0.25);}

const companyId = location.pathname.split('/')[2]; // /c/:cid
let company = null;

function applyPoster(){ document.body.style.backgroundImage = "url('/poster.png?lang=" + getLang() + "')"; }

async function init() {
  try {
    const r = await fetch('/api/company/' + companyId);
    if (r.status === 403) { showErr(t('company.disabled')); return; }
    if (!r.ok) { showErr(t('company.notFound')); return; }
    company = await r.json();
    // שפת ברירת-מחדל של החברה (אם השחקן לא בחר שפה בעצמו)
    window.FG_DEFAULT_LANG = company.defaultLang || 'he';
    I18N.applyLang();
    applyPoster();
    document.getElementById('companyNameTop').textContent = company.name;
    document.getElementById('gameName').textContent = company.gameName || t('common.gameName');
    document.getElementById('companyNameMenu').textContent = company.name;
    document.getElementById('joinLink').href = '/c/' + companyId + '/join';
    document.getElementById('boardLink').href = '/c/' + companyId + '/board';
    document.getElementById('progressLink').href = '/c/' + companyId + '/progress';
    document.getElementById('mapLink').href = '/c/' + companyId + '/map';
    document.getElementById('welcome').style.display = 'flex';
  } catch(e) { showErr(t('common.connErr')); }
}
function showErr(msg) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('menu').style.display = 'none';
  const s = document.getElementById('loadingErr'); s.style.display = 'flex'; s.classList.remove('hidden');
  document.getElementById('errMsg').textContent = msg;
}
function enter() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('ov').style.display = 'block';
  document.getElementById('menu').style.display = 'flex';
}

let qrScanner = null;
async function startScan() {
  const err = document.getElementById('scanErr'); err.textContent = '';
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('stopScanBtn').style.display = 'block';
  try {
    qrScanner = new Html5Qrcode('qrReader');
    await qrScanner.start({ facingMode:'environment' }, { fps:10, qrbox:{width:220,height:220} }, onScanSuccess, ()=>{});
  } catch(e) {
    err.textContent = t('common.camErr');
    document.getElementById('scanBtn').style.display = 'block';
    document.getElementById('stopScanBtn').style.display = 'none';
  }
}
function onScanSuccess(txt) {
  playScanSound();
  stopScan();
  try { const u = new URL(txt); if (/\/c\/[^/]+\/station\/\d+/.test(u.pathname)) { location.href = u.pathname + '?via=app'; return; } } catch(e){}
  location.href = txt;
}
async function stopScan() {
  if (qrScanner) { try { await qrScanner.stop(); qrScanner.clear(); } catch(e){} qrScanner = null; }
  document.getElementById('stopScanBtn').style.display = 'none';
  document.getElementById('scanBtn').style.display = 'block';
}

// בוררי דגלים (גם במסך הפתיחה וגם בתפריט)
I18N.renderLangPicker('langPickerW', {compact:true});
I18N.renderLangPicker('langPickerM');

function showPlayerHelp(){ document.getElementById('playerHelp').style.display='block'; }
function hidePlayerHelp(){ document.getElementById('playerHelp').style.display='none'; }
document.addEventListener('langchange', () => {
  applyPoster();
  if (company) document.getElementById('gameName').textContent = company.gameName || t('common.gameName');
});

init();
</script>
</body>
</html>

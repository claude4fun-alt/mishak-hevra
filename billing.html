<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="billing.heroTitle">משחק חברה</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',Arial,sans-serif; color:#1a2a4a; min-height:100vh;
    background:#0e1a14 url('/poster.png') center top / cover no-repeat fixed; }
  .overlay { position:fixed; inset:0; background:linear-gradient(180deg, rgba(10,20,15,.25), rgba(10,20,15,.55)); z-index:0; pointer-events:none; }
  .hero, main, .credit { position:relative; z-index:1; }
  .hero { padding:48px 20px 60px; text-align:center; }
  .langWrap { display:flex; justify-content:center; margin-bottom:18px; }
  .hero h1 { font-size:34px; font-weight:900; margin-bottom:10px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.6); }
  .hero p { font-size:17px; color:rgba(255,255,255,.92); max-width:480px; margin:0 auto 26px; line-height:1.6; text-shadow:0 1px 6px rgba(0,0,0,.6); }
  .heroCta { display:inline-block; background:linear-gradient(135deg,#f5b800,#ff9100); color:#1a1208; border:none; padding:18px 50px; border-radius:50px; font-size:19px; font-weight:900; cursor:pointer; box-shadow:0 12px 30px rgba(0,0,0,.4); text-decoration:none; }
  main { max-width:760px; margin:-30px auto 0; padding:0 18px 60px; }
  .card { background:#fff; border-radius:22px; padding:30px 26px; margin-bottom:22px; box-shadow:0 20px 50px rgba(0,0,0,.35); }
  .sectionTitle { font-size:22px; font-weight:800; margin-bottom:18px; color:#1a2a4a; text-align:center; }
  .featGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  @media (max-width:680px){ .featGrid{ grid-template-columns:1fr; } }
  .feat { background:#f5f8f3; border-radius:16px; padding:18px 14px; text-align:center; }
  .feat h3 { font-size:16px; margin-bottom:8px; color:#1a2a4a; }
  .feat p { font-size:13.5px; color:#5a6b8a; line-height:1.5; }
  .step { display:flex; gap:14px; align-items:flex-start; margin-bottom:18px; }
  .step:last-child { margin-bottom:0; }
  .stepNum { flex-shrink:0; width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#22a06b,#16c79a); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:15px; }
  .step h3 { font-size:16px; margin-bottom:4px; color:#1a2a4a; }
  .step p { font-size:14px; color:#5a6b8a; line-height:1.6; }
  .secureBox { display:flex; gap:14px; align-items:flex-start; background:#eaf3ee; border-radius:16px; padding:18px; }
  .secureBox .ic { font-size:30px; }
  .secureBox h3 { font-size:16px; margin-bottom:6px; color:#0f5a3c; }
  .secureBox p { font-size:14px; color:#2e5a45; line-height:1.6; }
  .sandboxNotice { background:#fff3cd; border:2px solid #f0a500; border-radius:14px; padding:12px 16px; font-size:13.5px; color:#5a3d12; font-weight:700; text-align:center; margin-bottom:20px; }
  .warnBox { background:#fdeeee; border-inline-start:4px solid #c0392b; border-radius:12px; padding:16px 18px; }
  .warnBox h3 { font-size:15px; color:#7c241a; margin-bottom:10px; }
  .warnBox ul { padding-inline-start:20px; }
  .warnBox li { font-size:13.5px; color:#7c241a; line-height:1.8; }
  label { display:block; font-size:13px; font-weight:700; color:#3a4a6a; margin-bottom:5px; }
  input { width:100%; padding:13px 14px; border:2px solid #dfe5ee; border-radius:12px; font-size:15px; font-family:inherit; margin-bottom:14px; }
  input:focus { outline:none; border-color:#22a06b; }
  .priceTag { text-align:center; font-size:26px; font-weight:900; color:#1a2a4a; margin-bottom:18px; }
  .priceTag span { font-size:14px; color:#5a6b8a; font-weight:600; display:block; margin-top:2px; }
  #paypal-buttons { margin-top:6px; min-height:55px; }
  .errMsg { color:#c0392b; font-size:13.5px; margin-top:8px; text-align:center; }
  .successBox { text-align:center; }
  .successBox .big { font-size:40px; margin-bottom:10px; }
  .credBox { background:#f0f3fa; border-radius:14px; padding:16px; margin:18px 0; text-align:right; }
  .credBox .row2 { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid #dfe5ee; }
  .credBox .row2:last-child { border-bottom:none; }
  .credBox b { color:#1a2a4a; }
  .dashBtn { display:block; text-align:center; background:linear-gradient(135deg,#22a06b,#16c79a); color:#fff; padding:16px; border-radius:14px; font-weight:800; font-size:16px; text-decoration:none; margin-top:14px; }
  .credit { text-align:center; color:rgba(255,255,255,.5); font-size:12.5px; padding:10px 0 30px; }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="hero">
  <div class="langWrap"><span id="langPickerTop"></span></div>
  <h1 data-i18n="billing.heroTitle">משחק חברה</h1>
  <p data-i18n="billing.heroSubtitle">מערכת תחנות QR לאירועי גיבוש משפחתיים וחברתיים</p>
  <a href="#signup" class="heroCta" data-i18n="billing.heroCta">🚀 התחילו עכשיו</a>
</div>

<main>

  <div class="card">
    <div class="sectionTitle" data-i18n="billing.featTitle">מה מקבלים</div>
    <div class="featGrid">
      <div class="feat"><h3 data-i18n="billing.feat1Title">🗺️ תחנות מותאמות</h3><p data-i18n="billing.feat1Body"></p></div>
      <div class="feat"><h3 data-i18n="billing.feat2Title">📊 לוח תוצאות חי</h3><p data-i18n="billing.feat2Body"></p></div>
      <div class="feat"><h3 data-i18n="billing.feat3Title">🌍 שלוש שפות</h3><p data-i18n="billing.feat3Body"></p></div>
    </div>
  </div>

  <div class="card">
    <div class="sectionTitle" data-i18n="billing.planTitle">איך זה עובד</div>
    <div class="step"><div class="stepNum">1</div><div><h3 data-i18n="billing.step1Title"></h3><p data-i18n="billing.step1Body"></p></div></div>
    <div class="step"><div class="stepNum">2</div><div><h3 data-i18n="billing.step2Title"></h3><p data-i18n="billing.step2Body"></p></div></div>
    <div class="step"><div class="stepNum">3</div><div><h3 data-i18n="billing.step3Title"></h3><p data-i18n="billing.step3Body"></p></div></div>
  </div>

  <div class="card">
    <div class="secureBox">
      <div class="ic">🔒</div>
      <div><h3 data-i18n="billing.secureTitle">תשלום מאובטח</h3><p data-i18n="billing.secureBody"></p></div>
    </div>
  </div>

  <div class="card" id="signup">
    <div id="sandboxNotice" class="sandboxNotice" style="display:none" data-i18n="billing.sandboxNotice"></div>
    <div class="sectionTitle" data-i18n="billing.formTitle">פתיחת חברה חדשה</div>

    <div id="formStep">
      <div class="priceTag" id="priceTag">—</div>

      <div class="warnBox" style="margin-bottom:20px">
        <h3 data-i18n="billing.warningsTitle">⚠️ לב הדברים שכדאי לדעת</h3>
        <ul>
          <li data-i18n="billing.warn1"></li>
          <li data-i18n="billing.warn2"></li>
          <li data-i18n="billing.warn3"></li>
        </ul>
      </div>

      <label data-i18n="billing.formName">שם החברה / המשפחה</label>
      <input id="coName" data-i18n-ph="billing.formNamePh">
      <label data-i18n="billing.formPass">סיסמה למנהל</label>
      <input id="coPass" type="password" data-i18n-ph="billing.formPassPh">
      <label data-i18n="billing.formEmail">אימייל (לקבלות ועדכונים)</label>
      <input id="coEmail" type="email" data-i18n-ph="billing.formEmailPh">

      <div id="paypal-buttons"></div>
      <p class="errMsg" id="formErr"></p>
    </div>

    <div id="successStep" class="successBox" style="display:none">
      <div class="big">🎉</div>
      <h3 data-i18n="billing.successTitle" style="font-size:20px;margin-bottom:8px"></h3>
      <p data-i18n="billing.successBody" style="color:#5a6b8a;font-size:14px"></p>
      <div class="credBox">
        <div class="row2"><span data-i18n="billing.formName"></span><b id="resName"></b></div>
        <div class="row2"><span data-i18n="billing.formPass"></span><b id="resPass"></b></div>
      </div>
      <a href="/dashboard" class="dashBtn" data-i18n="billing.goToDashboard">🎮 כניסה לדשבורד הניהול</a>
    </div>
  </div>

</main>

<p class="credit" data-i18n="common.createdBy">נוצר ע"י Amir Cohen</p>

<script src="/i18n.js"></script>
<script>
I18N.renderLangPicker('langPickerTop', {compact:true});
function applyPoster(){ document.body.style.backgroundImage = "url('/poster.png?lang=" + getLang() + "')"; }
applyPoster();

let BCFG = null;

async function loadConfig() {
  try {
    const r = await fetch('/api/billing/public-config');
    BCFG = await r.json();
  } catch(e) { BCFG = { paypalClientId:'', mode:'sandbox', weeklyPrice:19.9, currency:'USD' }; }

  document.getElementById('sandboxNotice').style.display = (BCFG.mode === 'sandbox') ? 'block' : 'none';
  renderPriceTag();
  I18N.applyLang();

  if (!BCFG.paypalClientId) {
    document.getElementById('paypal-buttons').innerHTML =
      '<p style="text-align:center;color:#c0392b;font-size:13.5px">PayPal לא הוגדר עדיין במנהל-על (טאב בילינג בדשבורד)</p>';
    return;
  }
  const s = document.createElement('script');
  s.src = 'https://www.paypal.com/sdk/js?client-id=' + encodeURIComponent(BCFG.paypalClientId) + '&currency=' + encodeURIComponent(BCFG.currency || 'USD');
  s.onload = renderPayPalButtons;
  s.onerror = () => { document.getElementById('formErr').textContent = t('billing.payError'); };
  document.head.appendChild(s);
}

function formatPrice() {
  const cur = (BCFG && BCFG.currency) || 'USD';
  const price = (BCFG && BCFG.weeklyPrice) || 19.9;
  return price + ' ' + cur;
}
function renderPriceTag() {
  document.getElementById('priceTag').innerHTML = formatPrice() + '<span>' + t('billing.perWeek') + '</span>';
}

function renderPayPalButtons() {
  if (!window.paypal) return;
  window.paypal.Buttons({
    style: { layout:'vertical', color:'gold', shape:'pill', label:'pay' },
    createOrder: function() {
      const name = document.getElementById('coName').value.trim();
      const pass = document.getElementById('coPass').value.trim();
      const err = document.getElementById('formErr');
      err.textContent = '';
      if (name.length < 2 || pass.length < 4) {
        err.textContent = t('billing.fillFirst');
        return Promise.reject(new Error('missing-fields'));
      }
      return fetch('/api/billing/create-order', { method:'POST' })
        .then(r => r.json())
        .then(d => { if (!d.orderId) throw new Error(d.error || 'create-order-failed'); return d.orderId; })
        .catch(e => { err.textContent = t('billing.payError'); throw e; });
    },
    onApprove: function(data) {
      const err = document.getElementById('formErr');
      return fetch('/api/billing/capture-order', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          orderId: data.orderID,
          name: document.getElementById('coName').value.trim(),
          password: document.getElementById('coPass').value.trim(),
          billingEmail: document.getElementById('coEmail').value.trim()
        })
      }).then(r => r.json()).then(d => {
        if (!d.ok) { err.textContent = d.error || t('billing.payError'); return; }
        document.getElementById('resName').textContent = document.getElementById('coName').value.trim();
        document.getElementById('resPass').textContent = document.getElementById('coPass').value.trim();
        document.getElementById('formStep').style.display = 'none';
        document.getElementById('successStep').style.display = 'block';
      }).catch(() => { err.textContent = t('billing.payError'); });
    },
    onError: function() { document.getElementById('formErr').textContent = t('billing.payError'); }
  }).render('#paypal-buttons');
}

document.addEventListener('langchange', () => {
  applyPoster();
  renderPriceTag();
  I18N.applyLang();
});

loadConfig();
</script>
</body>
</html>

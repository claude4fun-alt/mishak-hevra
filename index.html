<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="common.gameName">משחק חברה</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; color:#fff; padding:20px;
    background:#0e1a14 url('/poster.png') center top / cover no-repeat fixed; position:relative; }
  body::before { content:''; position:fixed; inset:0; background:linear-gradient(180deg,rgba(10,20,15,.05),rgba(10,20,15,.25)); z-index:0; }
  .card { position:relative; z-index:1; background:rgba(255,255,255,.97); color:#1a2a4a; border-radius:24px; padding:36px; max-width:420px; text-align:center; box-shadow:0 25px 60px rgba(0,0,0,.5); }
  h1 { font-size:30px; margin-bottom:8px; } p { color:#5a6b8a; margin-bottom:24px; font-size:15px; }
  .btn { display:block; width:100%; padding:16px; border-radius:14px; font-weight:800; font-size:17px; text-decoration:none; margin-bottom:12px; color:#fff; background:linear-gradient(135deg,#ff6b35,#ff9558); }
  .emoji { font-size:60px; margin-bottom:10px; }
  .note { background:#f0f3fa; border-radius:12px; padding:14px; font-size:13px; color:#5a6b8a; margin-top:8px; line-height:1.6; }
  .langbar { position:relative; z-index:1; display:flex; justify-content:center; margin-bottom:14px; }
</style>
</head>
<body>
<div class="card">
  <div class="langbar"><span id="langPicker"></span></div>
  <div class="emoji">🎮</div>
  <h1 data-i18n="common.gameName">משחק חברה</h1>
  <p data-i18n="index.subtitle">מערכת משחק תחנות רב-חברתית</p>
  <a class="btn" href="/dashboard" data-i18n="index.adminLogin">📝 כניסת מנהל</a>
  <div class="note" data-i18n-html="index.note">
    <strong>שחקנים</strong> מצטרפים על ידי סריקת ה-QR הראשי של החברה שלהם — לא דרך עמוד זה.<br>
    <strong>מנהל ראשי</strong> נכנס לדשבורד ליצירת חברות וניהולן.<br>
    <strong>מנהל חברה</strong> נכנס עם שם החברה והסיסמה שקיבל.
  </div>
  <p style="color:#8a98b5;font-size:13px;margin-top:16px;margin-bottom:0" data-i18n="common.createdBy">נוצר ע"י Amir Cohen</p>
</div>
<script src="/i18n.js"></script>
<script>
  I18N.renderLangPicker('langPicker');
  // עדכון תמונת הרקע לפי שפה
  function applyPoster(){ document.body.style.backgroundImage = "url('/poster.png?lang=" + getLang() + "')"; }
  applyPoster();
  document.addEventListener('langchange', applyPoster);
</script>
</body>
</html>
